name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'

jobs:
  build-and-push:
    name: Build e Push da imagem
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push da imagem
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/blunteds-devops-api:latest

  deploy:
    name: Deploy na vm-app
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Deploy
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/blunteds-devops-api:latest
          docker stop blunteds-devops-api || true
          docker rm blunteds-devops-api || true
          docker run -d \
            --name blunteds-devops-api \
            -p 8080:8080 \
            ${{ secrets.DOCKERHUB_USERNAME }}/blunteds-devops-api:latest